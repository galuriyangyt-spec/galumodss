<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Admin Panel v2.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Premium Dark Futuristic Theme Variables */
    :root {
      --bg-main: #06060a;
      --bg-surface: rgba(15, 15, 20, 0.65);
      --bg-surface-hover: rgba(25, 25, 35, 0.85);
      --glass-border: rgba(255, 255, 255, 0.05);
      --glass-border-focus: rgba(0, 240, 255, 0.3);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
      
      --primary: #00f0ff;
      --secondary: #ff0055;
      --accent: #8a2be2;
      --success: #00ffaa;
      --danger: #ff0055;
      --warning: #ffaa00;
      
      --text-main: #e2e8f0;
      --text-muted: #8b9bb4;
      
      --neon-gradient: linear-gradient(135deg, #ff0055, #8a2be2, #00f0ff);
      --neon-glow-primary: 0 0 20px rgba(0, 240, 255, 0.4);
      --neon-glow-secondary: 0 0 20px rgba(255, 0, 85, 0.4);
      --neon-glow-accent: 0 0 20px rgba(138, 43, 226, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 10px; border: 1px solid var(--glass-border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes floatUp {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Grid & Glow Background */
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: 
        linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -2;
    }
    body::after {
      content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.08), transparent 40%),
                  radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.08), transparent 30%),
                  radial-gradient(circle at 20% 80%, rgba(255, 0, 85, 0.08), transparent 30%);
      z-index: -1; animation: gradientBG 15s ease infinite;
    }

    .container { width: 100%; max-width: 1250px; margin: 0 auto; padding: 0 15px; }

    /* Header */
    .header {
      background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border); padding: 15px 0;
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
    }
    .header .container { display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .header-title {
      font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 12px;
      background: var(--neon-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: gradientBG 4s ease infinite; background-size: 200% 200%; letter-spacing: 1px;
    }
    .header-actions { display: flex; align-items: center; gap: 20px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: none; letter-spacing: 0.5px;
      position: relative; overflow: hidden;
    }
    .btn-icon {
      width: 42px; height: 42px; padding: 0; border-radius: 50%;
      color: var(--text-main); background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    }
    .btn-icon:hover { 
      background: var(--bg-surface-hover); color: var(--primary); 
      border-color: var(--primary); box-shadow: var(--neon-glow-primary); transform: scale(1.05); 
    }

    .btn-primary {
      background: var(--neon-gradient); background-size: 200% auto; color: #fff;
      box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4); z-index: 1;
    }
    .btn-primary::before {
      content: ''; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
      background: linear-gradient(135deg, #00f0ff, #8a2be2, #ff0055); background-size: 200% auto;
      z-index: -1; transition: opacity 0.3s ease; opacity: 0;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 240, 255, 0.5); }
    .btn-primary:hover::before { opacity: 1; animation: gradientBG 2s ease infinite; }
    .btn-block { width: 100%; padding: 14px; font-size: 1.05rem; }
    
    .btn-success { background: rgba(0, 255, 170, 0.1); color: var(--success); border: 1px solid rgba(0,255,170,0.3); }
    .btn-success:hover { background: var(--success); color: #000; box-shadow: 0 0 20px rgba(0, 255, 170, 0.5); }
    .btn-danger { background: rgba(255, 0, 85, 0.1); color: var(--danger); border: 1px solid rgba(255,0,85,0.3); }
    .btn-danger:hover { background: var(--danger); color: #fff; box-shadow: var(--neon-glow-secondary); }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 74px; left: 0; bottom: 0; width: 260px;
      background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border-right: 1px solid var(--glass-border); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 900;
      padding-top: 20px;
    }
    .sidebar.active { left: -260px; }
    .sidebar-menu { list-style: none; padding: 0 15px; }
    .sidebar-item { margin-bottom: 10px; }
    .sidebar-link {
      display: flex; align-items: center; padding: 14px 20px; color: var(--text-muted); cursor: pointer;
      text-decoration: none; border-radius: 12px; transition: all 0.3s ease; gap: 15px; font-weight: 500;
    }
    .sidebar-link:hover { color: #fff; background: rgba(255, 255, 255, 0.05); transform: translateX(5px); }
    .sidebar-link.active {
      color: #fff; background: linear-gradient(90deg, rgba(0,240,255,0.15) 0%, transparent 100%);
      border-left: 4px solid var(--primary); box-shadow: inset 10px 0 20px -10px rgba(0, 240, 255, 0.4);
    }
    .sidebar-link.active i { color: var(--primary); text-shadow: var(--neon-glow-primary); }

    /* Main Content */
    .main-content { margin-top: 74px; margin-left: 260px; padding: 40px 30px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .main-content.full-width { margin-left: 0; }
    .page-section { display: none; }
    .page-section.active { display: block; animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    .page-title { 
      font-size: 2rem; font-weight: 700; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; 
      color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

    /* Cards */
    .card {
      background: var(--bg-surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
      border-radius: 20px; box-shadow: var(--glass-shadow); padding: 35px; margin-bottom: 30px; transition: all 0.4s ease;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }
    .card:hover { transform: translateY(-5px); border-color: var(--glass-border-focus); box-shadow: 0 15px 45px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 240, 255, 0.05); }
    .card h2 { font-size: 1.4rem; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff; font-weight: 600; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; margin-bottom: 35px; }
    .stat-card {
      background: linear-gradient(145deg, rgba(25, 25, 35, 0.8), rgba(15, 15, 20, 0.9));
      backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px; padding: 30px; box-shadow: var(--glass-shadow); position: relative; overflow: hidden; transition: all 0.4s ease;
    }
    .stat-card:hover { transform: translateY(-8px); border-color: rgba(138, 43, 226, 0.3); box-shadow: 0 15px 35px rgba(0,0,0,0.6), var(--neon-glow-accent); }
    .stat-card h3 { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 15px; font-weight: 500; }
    .stat-card p { font-size: 2.8rem; font-weight: 700; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); line-height: 1; }
    .stat-icon { position: absolute; right: -15px; bottom: -20px; font-size: 7rem; opacity: 0.04; color: #fff; transition: all 0.5s ease; }
    .stat-card:hover .stat-icon { transform: scale(1.1) rotate(-15deg); opacity: 0.1; color: var(--accent); }

    /* Forms */
    .form-group { margin-bottom: 25px; }
    .label { display: block; margin-bottom: 10px; font-weight: 500; color: #fff; font-size: 1rem; letter-spacing: 0.5px; }
    .form-control {
      width: 100%; padding: 14px 20px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px; color: #fff; font-size: 15px; font-family: inherit; transition: all 0.3s ease; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }
    .form-control:focus { border-color: var(--primary); outline: none; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.15), inset 0 2px 5px rgba(0,0,0,0.5); }
    .form-control:disabled { background-color: rgba(255,255,255,0.02); color: var(--text-muted); cursor: not-allowed; }
    select.form-control option { background-color: #0f0f14; color: #fff; }
    ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; opacity: 0.7; transition: 0.3s; }
    ::-webkit-calendar-picker-indicator:hover { opacity: 1; filter: invert(0.8) sepia(1) hue-rotate(180deg) saturate(5); }

    .password-container { position: relative; }
    .toggle-password {
      position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-muted); width: 40px; height: 40px; box-shadow: none;
    }
    .toggle-password:hover { color: var(--primary); transform: translateY(-50%) scale(1.1); background: transparent; border: none; box-shadow: none; }

    /* Checkbox & Radio */
    .form-check { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .form-check-input {
      appearance: none; width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.2);
      border-radius: 6px; background: rgba(0,0,0,0.5); cursor: pointer; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-check-input[type="radio"] { border-radius: 50%; }
    .form-check-input:checked { border-color: var(--primary); background: var(--primary); box-shadow: var(--neon-glow-primary); }
    .form-check-input:checked::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; }
    .form-check-input[type="checkbox"]:checked::after { width: 6px; height: 12px; border: solid #000; border-width: 0 2px 2px 0; transform: translate(-50%, -60%) rotate(45deg); background: transparent; }
    .form-check-input[type="radio"]:checked::after { width: 10px; height: 10px; border-radius: 50%; }
    .form-check-label { user-select: none; color: #fff; font-weight: 500; }
    .radio-group { display: flex; gap: 30px; background: rgba(0,0,0,0.3); padding: 18px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }

    /* Switch Toggle */
    .form-switch { display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 10px 0; }
    .form-switch .form-check-input {
      appearance: none; width: 56px; height: 30px; background-color: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px; position: relative; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }
    .form-switch .form-check-input::before {
      content: ''; position: absolute; width: 22px; height: 22px; border-radius: 50%;
      background-color: var(--text-muted); top: 3px; left: 4px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-switch .form-check-input:checked { background-color: rgba(255, 0, 85, 0.2); border-color: var(--danger); }
    .form-switch .form-check-input:checked::before { transform: translateX(26px); background-color: var(--danger); box-shadow: 0 0 15px var(--danger); }

    /* Results & Alerts */
    .form-result { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-weight: 500; opacity: 0; transition: opacity 0.3s ease; display: none; }
    .form-result:not(:empty) { opacity: 1; display: block; animation: floatUp 0.4s ease forwards; }
    .form-result.success { background: rgba(0, 255, 170, 0.1); border: 1px solid rgba(0,255,170,0.3); color: var(--success); }
    .form-result.error { background: rgba(255, 0, 85, 0.1); border: 1px solid rgba(255,0,85,0.3); color: var(--danger); }

    .alert {
      position: fixed; top: 20px; right: 20px; padding: 18px 25px; border-radius: 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); z-index: 1100;
      animation: slideInRight 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; font-weight: 500; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
    }
    .alert-success { background: rgba(0, 255, 170, 0.15); border-left: 5px solid var(--success); color: #fff; }
    .alert-error { background: rgba(255, 0, 85, 0.15); border-left: 5px solid var(--danger); color: #fff; }
    @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Search Box */
    .search-box { position: relative; display: flex; align-items: center; }
    .search-box i { position: absolute; left: 18px; color: var(--text-muted); font-size: 1.1rem; }
    .search-box input {
      padding: 12px 20px 12px 45px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      width: 280px; background: rgba(0,0,0,0.4); color: #fff; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-size: 1rem;
    }
    .search-box input:focus { border-color: var(--accent); outline: none; background: rgba(0,0,0,0.7); box-shadow: var(--neon-glow-accent); width: 320px; }

    /* User Cards & Lists */
    .user-list { display: flex; flex-direction: column; gap: 25px; }
    .dashboard-user-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
    .loading, .no-users { padding: 40px; text-align: center; color: var(--text-muted); font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .loading i { font-size: 2.5rem; color: var(--primary); }
    
    .user-card {
      background: linear-gradient(145deg, rgba(20, 20, 30, 0.5), rgba(10, 10, 15, 0.8));
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.03);
      padding: 25px; transition: all 0.3s ease; animation: floatUp 0.5s ease backwards; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .user-card:hover { background: rgba(30,30,45,0.6); border-color: rgba(0,240,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(0,240,255,0.1); transform: translateY(-3px); }

    .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .user-header h3 { font-size: 1.3rem; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px; }
    .user-header h3::before { content: '\f007'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--primary); font-size: 1rem; }
    
    .user-status { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; padding: 6px 14px; border-radius: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .user-status.active { background: rgba(0, 255, 170, 0.1); color: var(--success); border: 1px solid rgba(0, 255, 170, 0.3); box-shadow: 0 0 15px rgba(0, 255, 170, 0.15); }
    .user-status.inactive { background: rgba(255, 0, 85, 0.1); color: var(--danger); border: 1px solid rgba(255, 0, 85, 0.3); box-shadow: 0 0 15px rgba(255, 0, 85, 0.15); }

    .user-details { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .dashboard-user-list .user-details { display: block; font-size: 0.95rem; color: var(--text-muted); }
    .dashboard-user-list .user-detail { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed rgba(255,255,255,0.05); }
    .dashboard-user-list .user-detail strong { color: #fff; font-weight: 500; }
    
    .detail-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .user-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }

    /* Admin Maintenance Warning Banner (Only visible to Admin) */
    .admin-maintenance-banner {
      background: linear-gradient(90deg, rgba(255, 0, 85, 0.15), rgba(255, 170, 0, 0.15)); 
      border: 1px solid rgba(255, 0, 85, 0.3); border-left: 5px solid var(--danger);
      color: #fff; padding: 18px 25px; border-radius: 12px; margin-bottom: 30px; 
      display: flex; align-items: center; gap: 15px; font-weight: 500; font-size: 1.05rem;
      box-shadow: 0 10px 30px rgba(255, 0, 85, 0.15); animation: floatUp 0.5s ease;
      backdrop-filter: blur(10px);
    }
    .admin-maintenance-banner i { font-size: 1.5rem; color: var(--danger); animation: pulse 2s infinite; }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .user-avatar img { object-fit: cover; border: 2px solid var(--primary); box-shadow: var(--neon-glow-primary); border-radius: 50%; }

    @media (max-width: 992px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .sidebar { left: -260px; }
      .sidebar.active { left: 0; }
      .main-content { margin-left: 0; padding: 25px 15px; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 20px; }
      .page-actions { width: 100%; flex-direction: column; gap: 15px; align-items: stretch; }
      .search-box input, .search-box input:focus { width: 100%; }
      .user-details { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .radio-group { flex-direction: column; gap: 15px; }
    }
  </style>
</head>
<body>

  <!-- Top Header -->
  <header class="header" id="mainHeader">
    <div class="container">
      <div class="header-left">
        <button class="btn btn-icon" id="side
